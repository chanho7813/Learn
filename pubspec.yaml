name: wordup
description: "A new Flutter project."
publish_to: 'none'
version: 0.5.0+16

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^11.0.2
  shared_preferences: ^2.5.3
  package_info_plus: ^9.0.1
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/WordUp.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/WordUp.png"

flutter:
  uses-material-design: true
  assets:
    - assets/wordbooks/
    - assets/readings/
