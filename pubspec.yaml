name: learn
description: "Learn app."
publish_to: 'none'
version: 0.10.8+37

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3
  package_info_plus: ^9.0.1
  http: ^1.2.1
  flutter_math_fork: ^0.7.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/learn.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/learn.png"
  web:
    generate: true
    image_path: "assets/learn.png"
    background_color: "#07111F"
    theme_color: "#0D9488"
  windows:
    generate: true
    image_path: "assets/learn.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/learn.png"

flutter:
  uses-material-design: true
  assets:
    - assets/english/
    - assets/math/
    - assets/solutions/english/
    - assets/solutions/math/
